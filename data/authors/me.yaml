bio: |
  Dr. Johel Padilla-Villanueva, DrPH is an independent researcher and university professor specializing in environmental health, vector-borne disease dynamics, and the development of novel theoretical frameworks in complex systems. His DrPH dissertation (UPR, 2022) examined the spatiotemporal dynamics of Aedes aegypti populations in the Caño Martín Peña area of San Juan, Puerto Rico.

  His current research centers on Systemic Tau (τ_s) and the Discrete Extramental Clock Law (RECD / Ley del Reloj Extramental Discreto), integrating fractal analysis (D ≈ 1.98), ordinal renormalization, ontological emergence, Bayesian accumulation, and applications to early-warning systems for dengue and other complex public health phenomena. He also explores connections with philosophy of physics and synthesis across chaos theory, information theory, and non-Laplacian probability.

  Recent publications (2026) are available on Zenodo. Open to interdisciplinary collaboration.

